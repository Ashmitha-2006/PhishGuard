<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard — Phishing URL Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 700px;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 18px;
            color: #888;
            margin-bottom: 50px;
        }

        .scan-box {
            background: #1a1d2e;
            border: 1px solid #2a2d3e;
            border-radius: 16px;
            padding: 40px;
        }

        .scan-box h2 {
            font-size: 22px;
            margin-bottom: 24px;
            color: #ccc;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            background: #0f1117;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            color: #ffffff;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #00d4ff;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        button {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            background: #00d4ff;
            color: #0f1117;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }

        button:hover {
            background: #00b8d9;
        }

        .error {
            color: #ff4d4d;
            margin-top: 12px;
            font-size: 14px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .feature {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .feature span {
            display: block;
            font-size: 28px;
            margin-bottom: 6px;
        }

        .disclaimer {
            margin-top: 40px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>PhishGuard</h1>
        <p class="tagline">AI-powered phishing URL detection for everyone</p>

        <div class="scan-box">
            <h2>Enter a URL to scan</h2>
            <form action="/scan" method="POST">
                <div class="input-group">
                    <input
                        type="text"
                        name="url"
                        placeholder="https://suspicious-link.com"
                        required
                        autofocus
                    />
                    <button type="submit">Scan Now</button>
                </div>
                {% if error %}
                <p class="error">{{ error }}</p>
                {% endif %}
            </form>
        </div>

        <div class="features">
            <div class="feature">
                <span>🔍</span>
                URL Analysis
            </div>
            <div class="feature">
                <span>🏷️</span>
                Brand Detection
            </div>
            <div class="feature">
                <span>📄</span>
                Page Analysis
            </div>
            <div class="feature">
                <span>🤖</span>
                ML Scoring
            </div>
        </div>
        <div class="nav" style="margin-top:20px">
            <a href="/email" style="padding:12px 24px; background:#1a1d2e; border:1px solid #2a2d3e; border-radius:8px; color:#00d4ff; text-decoration:none; font-size:14px;">
                📧 Try Email Scanner
            </a>
        </div>

        <p class="disclaimer">For educational and security research purposes only.</p>
    </div>
</body>
</html>
